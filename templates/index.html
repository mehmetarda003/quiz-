<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etkileşimli Quiz Arena</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="container">
      <h1>Quiz Arena</h1>
      <p class="subtitle">Kahoot tarzı canlı bilgi yarışması</p>

      <section class="card" id="roleCard">
        <h2>Rol Seçimi</h2>
        <div class="actions">
          <button id="hostModeBtn">Sunucu (Host)</button>
          <button id="playerModeBtn" class="secondary">Katılımcı</button>
        </div>
      </section>

      <section class="card hidden" id="hostCard">
        <h2>Yarışma Oluştur</h2>
        <div id="questionsList"></div>
        <button id="addQuestionBtn" class="secondary">+ Soru Ekle</button>
        <button id="createRoomBtn">Oda Oluştur</button>
        <div id="hostRoomInfo" class="hidden">
          <p>Oda Kodu: <strong id="roomCodeLabel"></strong></p>
          <div id="qrCode"></div>
          <p id="joinLinkText"></p>
          <button id="copyLinkBtn" class="secondary hidden">Baglantiyi Kopyala</button>
          <button id="startQuizBtn">Yarışmayı Başlat</button>
          <button id="nextQuestionBtn" class="secondary hidden">Sonraki Soru</button>
        </div>
      </section>

      <section class="card hidden" id="playerCard">
        <h2>Yarışmaya Katıl</h2>
        <label>İsim <input id="playerName" maxlength="24" /></label>
        <label>Oda Kodu <input id="joinCode" maxlength="6" /></label>

        <div class="avatar-editor">
          <h3>Avatar Tasarla (Telifsiz)</h3>
          <label>Ten / Yüz Rengi <input type="color" id="faceColor" value="#ffd7b5" /></label>
          <label>Saç Rengi <input type="color" id="hairColor" value="#442f1a" /></label>
          <label>Kıyafet Rengi <input type="color" id="shirtColor" value="#3a86ff" /></label>
          <label>Aksesuar
            <select id="accessory">
              <option value="none">Yok</option>
              <option value="glasses">Gozluk</option>
              <option value="cap">Sapka</option>
            </select>
          </label>
          <div id="avatarPreview"></div>
        </div>

        <button id="joinBtn">Katıl</button>
      </section>

      <section class="card hidden" id="questionCard">
        <h2 id="questionTitle">Soru</h2>
        <p id="questionText"></p>
        <div id="options"></div>
      </section>

      <section class="card hidden" id="leaderboardCard">
        <h2>Skor Tablosu</h2>
        <ul id="leaderboardList"></ul>
      </section>

      <section class="card" id="statusCard">
        <h2>Durum</h2>
        <p id="status">Hazır.</p>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
      window.__LOCAL_IP__ = "{{ local_ip }}";
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
  </html>
